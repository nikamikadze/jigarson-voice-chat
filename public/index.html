<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Mr. Jigarson Realtime</title>
  <link rel="stylesheet" href="/ui/styles.css">
</head>
<body>
  <main class="app">
    <section class="voice" aria-live="polite">
      <button id="mute" class="stop" title="Stop current response" aria-label="Stop current response">
        <span></span>
      </button>
      <div class="orb" id="orb">
        <div class="orb-core"></div>
        <div class="orb-ring"></div>
        <div class="orb-sheen"></div>
      </div>
      <div class="wave" id="wave" aria-hidden="true">
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
      </div>
      <div class="state" id="state">connecting</div>
      <div class="hint" id="hint">Starting voice session</div>
      <button id="talk" class="talk" type="button" aria-label="Hold to talk" disabled>
        <span class="talk-icon"></span>
        <span class="talk-text">Hold to talk</span>
      </button>
    </section>
  </main>
  <script type="module" src="/ui/app.js"></script>
</body>
</html>
